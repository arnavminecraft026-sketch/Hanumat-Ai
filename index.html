<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HanumatAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #0b0f19;
      color: white;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: #111827;
      border-right: 1px solid rgba(255,255,255,0.06);
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(90deg,#ff6b00,#ffcc00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 30px;
    }

    .new-chat {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(90deg,#ff7b00,#ffb300);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      margin-bottom: 25px;
    }

    .new-chat:hover {
      transform: scale(1.03);
      box-shadow: 0 0 20px rgba(255,140,0,0.5);
    }

    .history {
      flex: 1;
      overflow-y: auto;
    }

    .history-item {
      padding: 12px;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .history-item:hover {
      background: rgba(255,255,255,0.1);
    }

    .bottom {
      margin-top: 20px;
      font-size: 14px;
      color: #999;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at top,#141d33,#0b0f19);
    }

    .topbar {
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
    }

    .topbar h2 {
      font-size: 22px;
      font-weight: 600;
    }

    .profile {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(90deg,#ff7b00,#ffb300);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .chat-area {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .message {
      max-width: 70%;
      padding: 18px;
      border-radius: 18px;
      line-height: 1.5;
      animation: fadeIn 0.4s ease;
    }

    .user {
      align-self: flex-end;
      background: linear-gradient(90deg,#ff7b00,#ffb300);
      color: white;
    }

    .ai {
      align-self: flex-start;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
    }

    .input-area {
      padding: 20px 30px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      gap: 15px;
      align-items: center;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(12px);
    }

    .input-area input {
      flex: 1;
      padding: 16px;
      border-radius: 16px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.06);
      color: white;
      font-size: 15px;
    }

    .send-btn {
      padding: 14px 24px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(90deg,#ff7b00,#ffb300);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255,140,0,0.4);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.12);
      border-radius: 20px;
    }

    @media(max-width: 900px) {
      .sidebar {
        display: none;
      }

      .message {
        max-width: 90%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <div>
        <div class="logo">HanumatAI</div>
        <button class="new-chat" onclick="newChat()">+ New Chat</button>

        <div class="history" id="history">
          <div class="history-item">AI Website Idea</div>
          <div class="history-item">Generate Coding Project</div>
          <div class="history-item">Create Video Prompt</div>
        </div>
      </div>

      <div class="bottom">
        HanumatAI v1.0<br>
        Ultra Fast AI Assistant
      </div>
    </div>

    <div class="main">
      <div class="topbar">
        <h2>HanumatAI Chat</h2>
        <div class="profile">H</div>
      </div>

      <div class="chat-area" id="chatArea">
        <div class="message ai">
          Hello 👋 I am HanumatAI. Ask me anything about coding, AI, images, videos, or projects.
        </div>
      </div>

      <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask HanumatAI anything...">
        <button class="send-btn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script>
    const chatArea = document.getElementById('chatArea');
    const input = document.getElementById('userInput');

    function sendMessage() {
      const text = input.value.trim();
      if(text === '') return;

      const userMsg = document.createElement('div');
      userMsg.className = 'message user';
      userMsg.innerText = text;
      chatArea.appendChild(userMsg);

      input.value = '';
      chatArea.scrollTop = chatArea.scrollHeight;

      setTimeout(() => {
        const aiMsg = document.createElement('div');
        aiMsg.className = 'message ai';
        aiMsg.innerText = generateReply(text);
        chatArea.appendChild(aiMsg);
        chatArea.scrollTop = chatArea.scrollHeight;
      }, 800);
    }

    function generateReply(text) {
      const lower = text.toLowerCase();

      if(lower.includes('html')) {
        return 'I can generate advanced HTML, CSS and JavaScript websites instantly.';
      }

      if(lower.includes('image')) {
        return 'HanumatAI can create ultra realistic AI image prompts and designs.';
      }

      if(lower.includes('video')) {
        return 'HanumatAI supports cinematic video generation prompts similar to advanced AI tools.';
      }

      return 'HanumatAI is processing your request with ultra fast AI response system.';
    }

    function newChat() {
      chatArea.innerHTML = `
        <div class="message ai">
          New chat started successfully 🚀
        </div>
      `;
    }

    input.addEventListener('keypress', function(e) {
      if(e.key === 'Enter') {
        sendMessage();
      }
    });
  </script>
</body>
</html>
